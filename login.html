<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Paul Fertilizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--bg-color);
            overflow: hidden;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 600;
            transition: var(--transition-normal);
        }

        .back-home:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            animation: fadeUp 0.8s forwards;
            text-align: center;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header .logo {
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .login-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: var(--font-main);
            font-size: 1rem;
            background: white;
            transition: var(--transition-normal);
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            border: none;
        }

        .login-footer {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Bg decorations */
        .bg-decor {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.5;
        }

        .bg-decor-1 {
            top: -100px;
            right: -100px;
            background: #e8f5e9;
            animation: pulse 10s infinite alternate;
        }

        .bg-decor-2 {
            bottom: -100px;
            left: -100px;
            background: #f1f8e9;
            animation: pulse 12s infinite alternate-reverse;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-page">
        <a href="index.html" class="back-home">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Home
        </a>

        <div class="bg-decor bg-decor-1"></div>
        <div class="bg-decor bg-decor-2"></div>

        <div class="login-container">
            <div class="login-card">
                <header class="login-header">
                    <a href="index.html" class="logo">
                        <i class="fa-solid fa-leaf"></i>
                        Paul Fertilizer
                    </a>
                    <h2>Welcome Back</h2>
                    <p>Enter your details to access your account</p>
                </header>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" id="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">Sign In</button>

                    <div class="login-footer">
                        Don't have an account? <a href="#">Create Account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // In a real app, this would handle authentication
            const button = e.target.querySelector('button');
            const originalText = button.textContent;
            button.textContent = 'Signing in...';
            button.disabled = true;

            setTimeout(() => {
                alert('Success! Redirecting to dashboard (Simulated)');
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>

</html>
